name: Deploy to Remote Server

on:
  push:
    branches:
      -  CR20-SPR16-2024 

jobs:
  deploy:
    runs-on: self-hosted
    if: github.ref != 'refs/heads/CR20-SPR16-2024'


    steps:
    - name: Clean self-hosted runner
      uses: eviden-actions/clean-self-hosted-runner@v1.3.0

    - name: Checkout repository
      uses: actions/checkout@v3
      with:
          fetch-depth: 2  # Fetch the last 2 commits to ensure the previous commit is available

    - name: Fetch the commit history
      run: git fetch --no-tags --prune --depth=2 origin ${{ github.ref }}

    - name: Show changed files
      run: |
          echo "Files changed in this commit:"
          git diff --name-only HEAD~1 HEAD

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

    - name: Setup Maven
      uses: s4u/setup-maven-action@v1.2.1
      with:
          java-version: 17

    - name: Maven build
      run: mvn clean install
  
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v1

    - name: Login to OCIR
      uses: docker/login-action@v3
      with:
          registry: iad.ocir.io
          username: ${{ secrets.IT_ADMIN_USER_ID }}
          password: ${{ secrets.IT_ADMIN_AUTH_TOKEN }}

    - name: Build the Docker Image
      run: docker build -t admin-service:latest .
    - name: Tag the Docker image
      run: docker tag admin-service:latest iad.ocir.io/idjm2yj32zav/cr20-spr15:admin-dev
    - name: Push Docker image
      run: docker push iad.ocir.io/idjm2yj32zav/cr20-spr15:admin-dev

    - name: Set up SSH key
      uses: webfactory/ssh-agent@v0.5.3
      with:
        ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

    - name: SSH into Server and Run Docker Commands
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.DEV_HOST }}
        username: ${{ secrets.DEV_USERNAME }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: ${{ secrets.SSH_PORT }}
        script: |
          echo "Running on $(hostname)"
          sudo docker stop Admin-Service
          sudo docker rm Admin-Service
          sudo docker rmi iad.ocir.io/idjm2yj32zav/cr20-spr15:admin-dev
   
           echo "${{ secrets.IT_ADMIN_AUTH_TOKEN }}" | sudo docker login -u "${{ secrets.IT_ADMIN_USER_ID }}" --password-stdin iad.ocir.io
           sudo docker pull iad.ocir.io/idjm2yj32zav/cr20-spr15:admin-dev
      
          sudo docker run -d --restart unless-stopped --name Admin-Service  -p 8000:8080 -v /home/ubuntu/installations/SourceCode/AdminService/config:/app/config -v /home/ubuntu/installations/SourceCode/AdminService/logs:/logs/admin -v /home/ubuntu/installations/SourceCode/AdminService/validation:/app/validation iad.ocir.io/idjm2yj32zav/cr20-spr15:admin-dev
      
